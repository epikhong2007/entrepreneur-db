name: 创业者人物库 - 每日更新检测

on:
  schedule:
    # 每天早上9点（北京时间）= UTC 01:00
    - cron: '0 1 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser beautifulsoup4 lxml
        
    - name: Run update check script
      id: check
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python check_updates.py > output.log 2>&1
        echo "has_updates=$(grep -c '发现待审核' output.log || echo '0')" >> $GITHUB_OUTPUT
        
    - name: Commit pending review file
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add pending-review.json || echo "No pending-review.json"
        git commit -m "Auto-update: pending review data [$(date +'%Y-%m-%d')]" || echo "No changes"
        git push
      continue-on-error: true
      
    - name: Create Issue for review
      if: steps.check.outputs.has_updates != '0'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          let body = '## 🔔 待审核的人物变动\n\n';
          try {
            const data = JSON.parse(fs.readFileSync('pending-review.json', 'utf8'));
            if (data.items && data.items.length > 0) {
              data.items.forEach(item => {
                body += `- **${item.personName}**: ${item.detectedEvent}\n`;
                body += `  - 来源：${item.source}\n`;
                body += `  - 日期：${item.date}\n`;
                body += `  - [查看详情](${item.link})\n\n`;
              });
              body += `\n请访问 [人物库工具](https://epikhong2007.github.io/entrepreneur-db/) 进行审核，确认后更新人物数据。`;
            }
          } catch (e) {
            body += '请查看仓库中的 pending-review.json 文件获取详情。';
          }
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `🔔 人物库待审核变动 - ${new Date().toISOString().split('T')[0]}`,
            body: body,
            labels: ['review-needed', 'auto-generated']
          });
      continue-on-error: true
